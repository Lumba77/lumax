# Cognee memory stack (optional). CPU Ollama by default — GPU stays for Lumax soul / GGUF.
#
# Prereq: copy env for the Cognee image (expects /app/.env):
#   copy cognee.local.env.example cognee.local.env
#
# Start Ollama (CPU), then Cognee API on :8012:
#   docker compose -f docker-compose.yml -f docker-compose.cognee.yml --profile cognee up -d lumax_cognee_ollama lumax_cognee
#
# Pull small models once:
#   docker exec -it lumax_cognee_ollama ollama pull llama3.2:3b
#   docker exec -it lumax_cognee_ollama ollama pull nomic-embed-text
#
# GPU when free: Docker cannot auto-migrate. Either edit cognee.local.env to
# host.docker.internal:11434 (host Ollama on GPU), or add NVIDIA deploy to a
# duplicate compose override (do not run two Ollamas on the same GPU needlessly).
#
# Docs: https://docs.cognee.ai/guides/deploy-rest-api-server

services:
  lumax_cognee_ollama:
    profiles:
      - cognee
    image: ollama/ollama:latest
    container_name: lumax_cognee_ollama
    ports:
      - "11436:11434"
    volumes:
      - lumax_cognee_ollama:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
    deploy:
      resources:
        limits:
          cpus: "6"
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    networks:
      - lumax_local

  lumax_cognee:
    profiles:
      - cognee
    image: cognee/cognee:0.5.7
    container_name: lumax_cognee
    depends_on:
      lumax_cognee_ollama:
        condition: service_healthy
    ports:
      - "8012:8000"
    environment:
      - HOST=0.0.0.0
      - ENVIRONMENT=local
      - LOG_LEVEL=${COGNEE_LOG_LEVEL:-INFO}
      - CORS_ALLOWED_ORIGINS=${COGNEE_CORS_ALLOWED_ORIGINS:-*}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./cognee.local.env:/app/.env:ro
      - lumax_cognee_data:/data
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    networks:
      - lumax_local

volumes:
  lumax_cognee_ollama:
  lumax_cognee_data:
