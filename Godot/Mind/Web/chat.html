<!DOCTYPE html>
<html>
<head><style>body { background:#050505; color:#00e5ff; margin:0; font-family:monospace; } #chat { height:450px; overflow-y:auto; padding:20px; border-bottom:1px solid #004444; } #status { color:#ff0055; padding:10px; font-size:0.8em; }</style></head>
<body>
    <div id='status'>SOUL STATUS: LISTENING (NATIVE)</div>
    <div id='chat'>LUMAX: I am hearing you through the native vessel. No more browser prompts.</div>
    <script>
        function addMessage(who, text) {
            const chat = document.getElementById('chat');
            chat.innerHTML += '<div class="' + who.toLowerCase() + '">' + who + ': ' + text + '</div>';
            chat.scrollTop = chat.scrollHeight;
        }
        // This will be called by Godot via 'execute_javascript'
        window.lumaxUpdate = addMessage;
    </script>
</body>
</html>
