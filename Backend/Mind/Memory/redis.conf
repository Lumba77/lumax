# Redis configuration for Lumax
# ----------------------------

# Port to listen on
port 6379

# Bind to all interfaces (safe in Docker)
bind 0.0.0.0

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000

# Logging (warning: routine RDB saves are notice-level — keep logs quiet unless something breaks)
loglevel warning
logfile ""

# Databases
databases 16
